<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Album Cover Placeholder</title>
  <desc id="desc">Square placeholder album cover with border and center text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2f3a"/>
      <stop offset="100%" stop-color="#171b22"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="1200" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="1060" rx="12" fill="none" stroke="#ffffff" stroke-width="18"/>
  <rect x="165" y="470" width="870" height="260" rx="18" fill="rgba(255,255,255,0.08)" stroke="#ffffff" stroke-width="4"/>
  <text x="600" y="590" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-size="112" font-weight="700" font-family="Arial, Helvetica, sans-serif" letter-spacing="4">
    ALBUM COVER
  </text>
</svg>
