<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player Style Poster</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-label="Music poster generator">
      <section class="setup-panel" id="setup-panel" aria-label="Poster setup form">
        <h1 class="setup-title">Create your poster</h1>
        <form id="poster-form" class="setup-form">
          <label>
            Buscar por artista
            <input
              type="search"
              id="artist-search-input"
              name="artist-search"
              placeholder="Ej: Bad Bunny"
              list="artists-suggestions"
              autocomplete="off"
            />
          </label>

          <datalist id="artists-suggestions"></datalist>

          <label>
            Buscar por canción
            <input
              type="search"
              id="song-search-input"
              name="song-search"
              required
              placeholder="Ej: Moscow Mule"
              list="tracks-suggestions"
              autocomplete="off"
            />
          </label>

          <datalist id="tracks-suggestions"></datalist>

          <section class="track-preview hidden" id="track-preview" aria-live="polite" aria-label="Selected track preview">
            <img id="track-preview-cover" class="track-preview-cover" src="assets/cover.svg" alt="Selected album cover preview" width="72" height="72" />
            <small id="track-preview-meta" class="track-preview-meta"></small>
          </section>

          <fieldset class="theme-selector" aria-label="Poster color mode">
            <legend>Color del póster</legend>
            <label>
              <input type="radio" name="poster-theme" value="dark" checked />
              Clásico (blanco sobre oscuro)
            </label>
            <label>
              <input type="radio" name="poster-theme" value="inverse" />
              Elegante (oscuro sobre claro)
            </label>
          </fieldset>

          <button type="submit">Generate poster</button>
        </form>
      </section>

      <section class="poster hidden" id="poster" aria-label="Music player poster mockup">
        <div class="background-layer" id="background-layer" aria-hidden="true"></div>

        <section class="content">
          <figure class="album-cover-wrap">
            <img id="cover-image" src="cover1.png" alt="Album cover" class="album-cover" />
          </figure>

          <section class="player-overlay" aria-label="Player overlay">
            <div class="wave-row" aria-hidden="true">
              <div class="wave-bars">
                <span style="--h: 16px"></span>
                <span style="--h: 26px"></span>
                <span style="--h: 12px"></span>
                <span style="--h: 34px"></span>
                <span style="--h: 20px"></span>
                <span style="--h: 40px"></span>
                <span style="--h: 14px"></span>
                <span style="--h: 46px"></span>
                <span style="--h: 22px"></span>
                <span style="--h: 32px"></span>
                <span style="--h: 12px"></span>
                <span style="--h: 38px"></span>
                <span style="--h: 18px"></span>
                <span style="--h: 44px"></span>
                <span style="--h: 16px"></span>
              </div>
            </div>

            <div class="title-row">
              <h2 id="track-title">Viajo Sin Ver (Remix) [feat De La...]</h2>
              <button class="heart" aria-label="Liked song">♥</button>
            </div>

            <p class="artist-row">
              <span class="explicit">E</span>
              <span id="track-artists" class="artist-text">Jon Z, De La Ghetto, Almighty, Miky...</span>
            </p>

            <div class="progress-wrap" aria-hidden="true">
              <div class="progress-bar"><span class="knob"></span></div>
              <div class="time-row">
                <span id="time-current">7:52</span>
                <span id="time-total">9:29</span>
              </div>
            </div>

            <div class="controls" aria-label="Playback controls">
              <button class="icon shuffle" aria-label="Shuffle"></button>
              <button class="icon previous" aria-label="Previous"></button>
              <button class="icon play" aria-label="Play"></button>
              <button class="icon next" aria-label="Next"></button>
              <button class="icon repeat" aria-label="Repeat"></button>
            </div>
          </section>
        </section>
      </section>

      <section class="download-actions hidden" id="download-actions" aria-label="Poster download actions">
        <button type="button" class="download-btn" data-export-width="500">Download JPG (500px wide)</button>
        <button type="button" class="download-btn" data-export-width="1000">Download JPG (1000px wide)</button>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="poster.js"></script>
  </body>
</html>
